<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio QR</title>

<style>
body{
  font-family: sans-serif;
  text-align:center;
  margin:30px;
}

input{
  width:80%;
  max-width:600px;
  padding:10px;
}

button{
  margin-top:10px;
  padding:10px 20px;
}

#qr img{
  margin-top:20px;
}
</style>

</head>

<body>

<h1>Audio QR Generator</h1>

<p>OneDriveやTeamsの共有URLを貼り付けてください</p>

<input
type="text"
id="url"
placeholder="共有リンクを入力">

<br>

<button onclick="generateQR()">
QRコード生成
</button>

<div id="qr"></div>

<script>
function generateQR(){

const url=document.getElementById("url").value;

if(!url){
alert("URLを入力してください");
return;
}

document.getElementById("qr").innerHTML =
'api.qrserver.com/v1/create-qr-code/?size=250x250&data='+ encodeURIComponent(url) +

}
</script>

</body>
</html>
