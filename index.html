<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio QR Generator</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  margin:30px;
}

input{
  width:80%;
  max-width:600px;
  padding:10px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  cursor:pointer;
}

#qr img{
  margin-top:20px;
}
</style>

</head>

<body>

<h1>Audio QR Generator</h1>

<p>OneDriveやTeamsの共有URLを貼り付けてください</p>

<input
type="text"
id="url"
placeholder="共有リンクを入力">

<br>

<button onclick="generateQR()">
QRコード生成
</button>

<div style="
background:#fff8dc;
border:2px solid #f0c36d;
padding:15px;
margin-top:20px;
border-radius:10px;
max-width:600px;
margin-left:auto;
margin-right:auto;
text-align:left;
">

<h3>📢 ご利用について</h3>

<p><b>対応形式</b></p>

<ul>
<li>M4A</li>
<li>MP3</li>
<li>WAV</li>
<li>MP4</li>
</ul>

<ul>
<li>アップロードされた音声・動画ファイルは12時間後に自動削除されます。</li>
<li>保存ファイル数が20件を超えた場合、古いファイルから自動削除されます。</li>
<li>重要な音声・動画ファイルは各自でバックアップしてください。</li>
<li>不適切なファイルのアップロードは禁止です。</li>
</ul>

</div>
  
<div id="qr"></div>

<script>
function generateQR() {

  const url =
  document.getElementById("url").value;

  if (!url) {
    alert("URLを入力してください");
    return;
　}
  
  document.getElementById("qr").innerHTML =
  '<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=' +
  encodeURIComponent(url) +
  '">';
}
　</script>

  </body>
  </html>
